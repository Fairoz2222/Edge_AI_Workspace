<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Edge Weather Dashboard</title>

<style>

body {
  margin:0;
  font-family: 'Segoe UI', Arial, sans-serif;
  background-image: url("https://picsum.photos/1920/1080");
  background-size: cover;
  background-position: center;
  color:white;
  text-align:center;
}

h1{
  margin-top:40px;
  font-size:42px;
}

.container{
  margin-top:80px;
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:40px;
}

.card{
  background:rgba(255,255,255,0.9);
  color:black;
  width:240px;
  padding:30px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.4);
  transition: transform 0.3s;
}

.card:hover{
  transform: translateY(-8px);
}

.weather-icon{
  width:60px;
  margin-top:10px;
}

.temp{
  font-size:32px;
  font-weight:bold;
}

.footer{
  margin-top:80px;
  font-size:18px;
}

</style>
</head>

<body>

<h1>🌦 Edge Weather Dashboard</h1>

<div class="container">

<div class="card">
<h2>Boston</h2>
<img src="images/cloud.png" class="weather-icon">
<div class="temp">22°C</div>
</div>

<div class="card">
<h2>New York</h2>
<img src="images/rain.png" class="weather-icon">
<div class="temp">18°C</div>
</div>

<div class="card">
<h2>San Francisco</h2>
<img src="images/fog.png" class="weather-icon">
<div class="temp">16°C</div>
</div>

<div class="card">
<h2>London</h2>
<img src="images/sun.png" class="weather-icon">
<div class="temp">14°C</div>
</div>

</div>

<div class="footer">
Deployed via GitOps using ArgoCD 🚀
</div>

</body>
</html>
