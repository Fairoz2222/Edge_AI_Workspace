apiVersion: apps/v1
kind: Deployment
metadata:
  name: edge-weather-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: edge-weather
  template:
    metadata:
      labels:
        app: edge-weather
    spec:
      containers:
      - name: edge-weather
        image: nginx:latest
        ports:
        - containerPort: 80
        volumeMounts:
        - name: html
          mountPath: /usr/share/nginx/html
      volumes:
      - name: html
        configMap:
          name: edge-weather-html
