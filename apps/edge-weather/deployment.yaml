apiVersion: apps/v1
kind: Deployment
metadata:
  name: edge-weather-app
  labels:
    app: edge-weather
spec:
  replicas: 4

  selector:
    matchLabels:
      app: edge-weather

  template:
    metadata:
      labels:
        app: edge-weather

    spec:
      containers:
      - name: edge-weather
        image: registry.k8s.io/nginx-slim:0.8

        ports:
        - containerPort: 80

        resources:
          requests:
            cpu: "50m"
            memory: "32Mi"
          limits:
            cpu: "200m"
            memory: "128Mi"

        volumeMounts:
        - name: html
          mountPath: /usr/share/nginx/html

      volumes:
      - name: html
        configMap:
          name: edge-weather-html
