apiVersion: v1
kind: ConfigMap
metadata:
  name: edge-weather-html
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Edge Weather Dashboard</title>
      <style>
        body {
          margin: 0;
          font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
          /* FALLBACK: Professional Blue Gradient if Image Fails */
          background: linear-gradient(135px, #1e293b 0%, #334155 100%);
          /* IMAGE: The high-res office background from your first screenshot */
          background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url("https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=1920&q=80");
          background-size: cover;
          background-position: center;
          background-attachment: fixed;
          color: white;
          text-align: center;
          min-height: 100vh;
        }

        h1 {
          margin: 0;
          padding-top: 50px;
          font-size: 48px;
          letter-spacing: 1px;
          text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .container {
          margin-top: 50px;
          display: flex;
          justify-content: center;
          flex-wrap: wrap;
          gap: 30px;
          padding: 20px;
        }

        .card {
          background: rgba(255, 255, 255, 0.98);
          color: #1e293b;
          width: 260px;
          padding: 40px 20px;
          border-radius: 24px;
          box-shadow: 0 20px 40px rgba(0,0,0,0.4);
          transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
          display: flex;
          flex-direction: column;
          align-items: center;
        }

        .card:hover {
          transform: translateY(-15px) scale(1.02);
          box-shadow: 0 30px 60px rgba(0,0,0,0.6);
        }

        h2 {
          margin: 0;
          font-size: 28px;
          font-weight: 600;
        }

        .weather-icon {
          width: 140px; /* Scaled up to fill the card */
          height: 140px;
          margin: -10px 0;
          filter: drop-shadow(0 8px 12px rgba(0,0,0,0.15));
        }

        .temp {
          font-size: 42px;
          font-weight: 800;
          margin-top: -5px;
        }

        .footer {
          margin-top: 70px;
          padding-bottom: 50px;
          font-size: 18px;
          opacity: 0.9;
        }

        .badge {
          background: rgba(255,255,255,0.2);
          padding: 8px 16px;
          border-radius: 50px;
          backdrop-filter: blur(5px);
          border: 1px solid rgba(255,255,255,0.3);
        }
      </style>
    </head>
    <body>
      <h1>🌦 Edge Weather Dashboard</h1>
      <h1>🌦Welcome Abdul Rahman</h1>

      <div class="container">
        <div class="card">
          <h2>Boston</h2>
          <img src="https://openweathermap.org/img/wn/01d@4x.png" alt="Sunny" class="weather-icon">
          <div class="temp">22°C</div>
        </div>

        <div class="card">
          <h2>New York</h2>
          <img src="https://openweathermap.org/img/wn/02d@4x.png" alt="Partly Cloudy" class="weather-icon">
          <div class="temp">18°C</div>
        </div>

        <div class="card">
          <h2>San Francisco</h2>
          <img src="https://openweathermap.org/img/wn/03d@4x.png" alt="Cloudy" class="weather-icon">
          <div class="temp">16°C</div>
        </div>

        <div class="card">
          <h2>London</h2>
          <img src="https://openweathermap.org/img/wn/10d@4x.png" alt="Rainy" class="weather-icon">
          <div class="temp">14°C</div>
        </div>
      </div>

      <div class="footer">
        <span class="badge">Deployed via <b>GitOps</b> using <b>ArgoCD</b> 🚀</span>
      </div>
    </body>
    </html>
