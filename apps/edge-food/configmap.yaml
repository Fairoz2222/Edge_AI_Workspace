apiVersion: v1
kind: ConfigMap
metadata:
  name: edge-food-html
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
      <meta charset="UTF-8">
      <title>Edge Food Menu</title>

      <style>

        body{
          margin:0;
          font-family: Arial, Helvetica, sans-serif;
          background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
          color:white;
          text-align:center;
        }

        h1{
          padding:30px;
          font-size:40px;
        }

        .menu{
          display:flex;
          justify-content:center;
          flex-wrap:wrap;
          gap:30px;
          padding:30px;
        }

        .card{
          background:white;
          color:black;
          width:220px;
          border-radius:15px;
          box-shadow:0 10px 25px rgba(0,0,0,0.3);
          overflow:hidden;
          transition:0.3s;
        }

        .card:hover{
          transform:scale(1.05);
          box-shadow:0 15px 35px rgba(0,0,0,0.4);
        }

        .card img{
          width:100%;
          height:160px;
          object-fit:cover;
        }

        .card h3{
          padding:15px;
        }

        footer{
          margin-top:40px;
          padding:20px;
          font-size:14px;
          color:#ddd;
        }

      </style>
    </head>

    <body>

      <h1>🍽️ Edge Food Menu</h1>

      <div class="menu">

        <div class="card">
          <img src="/images/burger.jpg">
          <h3>🍔 Burger</h3>
        </div>

        <div class="card">
          <img src="/images/pizza.jpg">
          <h3>🍕 Pizza</h3>
        </div>

        <div class="card">
          <img src="/images/taco.jpg">
          <h3>🌮 Taco</h3>
        </div>

        <div class="card">
          <img src="/images/juice.jpg">
          <h3>🥤 Juice</h3>
        </div>

      </div>

      <footer>
        Deployed via GitOps using ArgoCD 🚀
      </footer>

    </body>
    </html>
